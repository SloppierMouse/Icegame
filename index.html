<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Drop Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #05080f; }
  canvas { display: block; }

  /* Cube counter — top-right corner, session-only display */
  #cube-counter {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0, 0, 0, 0.45);
    color: rgba(220, 235, 255, 0.92);
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    pointer-events: none;
    letter-spacing: 0.03em;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<!-- Cube counter — displays how many ice cubes have spawned this session -->
<div id="cube-counter">Cubes: 0</div>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── Dimensions ──────────────────────────────────────────────────────────────
let W, H, counterY;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  counterY = H * 0.8;
}
resize();
window.addEventListener('resize', () => { resize(); if (state === 'idle' && ice) resetIcePos(); });

const ICE_W = 120, ICE_H = 120;

// ─── Helpers ─────────────────────────────────────────────────────────────────
function rnd(a, b)    { return a + Math.random() * (b - a); }
function rndInt(a, b) { return Math.floor(a + Math.random() * (b - a + 1)); }
function lerp(a, b, t){ return a + (b - a) * t; }

// ─── Game state ───────────────────────────────────────────────────────────────
// 'idle'     – ice resting on counter
// 'held'     – ice following mouse
// 'falling'  – ice falling with gravity after release
// 'cracked'  – shards sliding
// 'melting'  – shards shrinking, water particles spawning
// 'spawning' – new ice cube fading in
let state = 'idle';

// ─── Cube counter (session-only, resets on page refresh) ──────────────────────
// Tracks how many ice cubes have spawned after a shatter + melt sequence.
// Future: connect to leaderboard
let cubeCount = 0;

// Ice cube
let ice = null;          // { x, y, vx, vy, cracks[], alpha, angle, angularVel }
function mkIce() {
  // A fresh cube always starts with no cracks — cracks reset only here,
  // which is called AFTER the full shatter → melt → spawn sequence.
  return { x: W / 2, y: counterY - ICE_H / 2, vx: 0, vy: 0, cracks: [], alpha: 1,
           angle: 0, angularVel: 0 };
}
function resetIcePos() { if (ice) { ice.x = W / 2; ice.y = counterY - ICE_H / 2; } }

// Shards  — poly stored as LOCAL (relative to x,y) coords
let shards = [];
// { x, y, vx, vy, poly:[[rx,ry]…], alpha, scale, airborne, airVy, bounced, falling, fallVy }

// MELT SEQUENCE variables
let meltFrameTime = 0;   // global frame counter used for melt calculations
const MELT_RATE   = 0.004;  // meltProgress increase per frame

// Spawning
let spawnTimer = 0;
const SPAWN_FRAMES = 60;     // 1 second at 60 fps

// ─── Crack accumulation thresholds ────────────────────────────────────────────
// The cube breaks apart only when EITHER enough crack lines have built up OR
// their total combined length is long enough.  Tuned so that 3–5 gentle drops
// feel like a slow build-up while 1–2 hard drops can shatter the cube.
const CRACK_COUNT_THRESHOLD  = 7;    // break when this many crack lines have accumulated
const CRACK_LENGTH_THRESHOLD = 200;  // or when their total pixel length exceeds this

// ─── Rotation physics ─────────────────────────────────────────────────────────
// The cube hangs from the grab point like a pendulum.
// Mouse horizontal movement accelerates the swing; a spring-like restoring force
// pulls the cube back toward hanging straight down (simulates gravity).
// On release the spin carries into free-fall and decays at SPIN_DAMP each frame.
const PENDULUM_MOUSE_ACCEL = 0.0008; // how strongly horizontal mouse movement accelerates the swing
const PENDULUM_RESTORE     = 0.015;  // gravity-like restoring spring — pulls cube back to vertical
const PENDULUM_DAMP        = 0.88;   // multiplies angular velocity each frame
const MAX_PENDULUM_ANGVEL  = 0.08;   // maximum angular velocity in radians per frame
// Post-release spin damping: 0.97 per frame → ~16 % remaining after 60 frames (~1 s at 60 fps).
const SPIN_DAMP            = 0.97;

// Mouse / drag
const mouse = { x: 0, y: 0, down: false };
// drag = null | { type:'ice' } | { type:'shard', idx, offX, offY }
let drag = null;

// Pendulum state — initialised on grab, used every held frame
// The grab point (mouse) is the fixed pivot; the cube hangs below on a rigid rod.
let pendulumLen         = 0;  // rod length: distance from grab point to cube center (px)
let pendulumAngle       = 0;  // rod angle from downward vertical (0 = straight down), radians
let pendulumAngVel      = 0;  // angular velocity of pendulum (rad/frame)
let pendulumAngleAtGrab = 0;  // pendulumAngle recorded at moment of grab
let cubeAngleAtGrab     = 0;  // ice.angle recorded at moment of grab
let lastMouseX          = 0;  // mouse X from the previous frame

// For velocity estimation on release — records the last N animation-frame
// mouse positions while the cube is held, so we can compute a throw velocity.
const VELOCITY_SAMPLE_COUNT = 5; // how many recent frames to average
let mouseHistory = [];           // array of { x, y } snapshots

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX; mouse.y = e.clientY;
});

canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  if (state === 'idle' && ice && hitBox(mouse.x, mouse.y, ice.x, ice.y, ICE_W, ICE_H)) {
    // Compute the pendulum rod: vector from grab point (mouse) to cube center.
    const rodX          = ice.x - mouse.x;
    const rodY          = ice.y - mouse.y;
    pendulumLen         = Math.sqrt(rodX * rodX + rodY * rodY);
    pendulumAngle       = Math.atan2(rodX, rodY); // angle from downward (+Y axis in screen space)
    pendulumAngleAtGrab = pendulumAngle;
    pendulumAngVel      = 0;
    cubeAngleAtGrab     = ice.angle;
    lastMouseX          = mouse.x; // capture grab position so the first frame's delta is zero
    drag = { type: 'ice' };
    state = 'held';
    canvas.style.cursor = 'grabbing';
    mouseHistory = []; // Clear old history so the throw reads only this drag
  } else if (state === 'cracked') {
    for (let i = 0; i < shards.length; i++) {
      const s = shards[i];
      if (!s.falling && hitPoly(mouse.x - s.x, mouse.y - s.y, s.poly)) {
        drag = { type: 'shard', idx: i, offX: mouse.x - s.x, offY: mouse.y - s.y };
        break;
      }
    }
  }
});

canvas.addEventListener('mouseup', () => {
  mouse.down = false;
  if (state === 'held' && drag && drag.type === 'ice') {
    releaseDrop();
  }
  // When releasing a dragged shard above the counter, re-enter the fall loop.
  if (state === 'cracked' && drag && drag.type === 'shard') {
    const s = shards[drag.idx];
    if (s) {
      const floor = counterY - 10;
      if (s.y < floor - 5) {
        s.airborne = true;
        s.airVy    = s.vy;
      } else {
        s.y = floor;
      }
    }
  }
  drag = null;
  canvas.style.cursor = 'default';
});

// ─── Hit testing ──────────────────────────────────────────────────────────────
function hitBox(mx, my, cx, cy, w, h) {
  return mx >= cx - w/2 && mx <= cx + w/2 && my >= cy - h/2 && my <= cy + h/2;
}

// lx, ly are already in local (shard-relative) space
function hitPoly(lx, ly, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    if ((yi > ly) !== (yj > ly) && lx < (xj - xi) * (ly - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

// ─── Crack helpers ────────────────────────────────────────────────────────────

// Sum the pixel length of every crack line currently stored on the ice cube.
function totalCrackLength(cracks) {
  let total = 0;
  for (const [x0, y0, x1, y1] of cracks) {
    const dx = x1 - x0, dy = y1 - y0;
    total += Math.sqrt(dx * dx + dy * dy);
  }
  return total;
}

// Generate `count` random crack lines radiating outward from the ice centre.
function makeCrackLines(count, minLen, maxLen) {
  const lines = [];
  for (let i = 0; i < count; i++) {
    const angle = rnd(0, Math.PI * 2);
    const len   = rnd(minLen, maxLen);
    lines.push([
      Math.cos(angle) * 4,    // start X (small offset from centre)
      Math.sin(angle) * 4,    // start Y
      Math.cos(angle) * len,  // end X
      Math.sin(angle) * len   // end Y
    ]);
  }
  return lines;
}

// ─── WATER SYSTEM ─────────────────────────────────────────────────────────────
// Metaball-based water replaces the old static puddle.  Each melting shard
// spawns water particles that drift together under surface tension, then
// slowly evaporate — edge particles (few neighbours) first, centre last.
//
// Rendering uses two offscreen canvases:
//   waterBlobCanvas — white flat ellipses, one per particle
//   waterMaskCanvas — blob canvas run through CSS blur+contrast to threshold
//                     overlapping circles into organic merged blobs, then
//                     source-in filled with translucent blue
// This keeps the threshold math off the GPU raster path and out of the main loop.

const MAX_WATER_PARTICLES = 200;   // hard cap; new spawns are skipped when full
const WATER_EVAP_FRAMES   = 480;   // ~8 s at 60 fps for a fully isolated particle
const WATER_GRAVITY       = 0.025; // downward acceleration per frame (very slow)
const WATER_FRICTION      = 0.92;  // velocity multiplier per frame (damps motion)
const TENSION_RADIUS      = 75;    // px — attraction acts within this distance
const TENSION_FORCE       = 0.035; // acceleration toward neighbour per frame
const TENSION_MIN_DIST    = 16;    // px — prevents two particles collapsing to one point
const NEIGHBOR_RADIUS     = 55;    // px — counts neighbours for evaporation rate
const WATER_BLUR_PX       = 14;    // CSS blur radius; larger = more blob merging

// waterParticles: { x, y, vx, vy, radius, baseRadius, neighborCount, evaporating }
let waterParticles  = [];
// waterRipples: { x, y, radius, maxRadius, age, maxAge } — expanding rings on shard landing
let waterRipples    = [];
// waterDroplets: { x, y, vx, vy, radius } — airborne splash arcs that settle as particles
let waterDroplets   = [];
// true once the current melt batch finishes — new settled droplets start evaporating immediately
let waterEvapActive = false;

// Two offscreen canvases allocated once, resized on window resize
let waterBlobCanvas = null, waterBlobCtx = null;
let waterMaskCanvas = null, waterMaskCtx = null;

function initWaterCanvases() {
  waterBlobCanvas = document.createElement('canvas');
  waterBlobCanvas.width  = W; waterBlobCanvas.height = H;
  waterBlobCtx = waterBlobCanvas.getContext('2d');

  waterMaskCanvas = document.createElement('canvas');
  waterMaskCanvas.width  = W; waterMaskCanvas.height = H;
  waterMaskCtx = waterMaskCanvas.getContext('2d');
}
initWaterCanvases();

// Keep offscreen canvases in sync with the main canvas on resize
window.addEventListener('resize', () => {
  if (waterBlobCanvas) { waterBlobCanvas.width = W; waterBlobCanvas.height = H; }
  if (waterMaskCanvas) { waterMaskCanvas.width = W; waterMaskCanvas.height = H; }
});

// Add one water particle; silently skips if the cap is already reached.
function spawnWaterParticle(x, y, radius, vx, vy) {
  if (waterParticles.length >= MAX_WATER_PARTICLES) return;
  waterParticles.push({
    x, y,
    vx: vx || 0,
    vy: vy || 0,
    radius,
    baseRadius: radius,
    neighborCount: 0,
    evaporating: waterEvapActive   // inherits current evap state at spawn time
  });
}

// Called when melt completes — marks all particles evaporating and gates future spawns.
function startWaterEvaporation() {
  waterEvapActive = true;
  for (const p of waterParticles) p.evaporating = true;
}

// True if any particle is within `dist` px of (x, y) — used for ripple / splash checks.
function hasWaterNear(x, y, dist) {
  const d2 = dist * dist;
  for (const p of waterParticles) {
    const dx = p.x - x, dy = p.y - y;
    if (dx * dx + dy * dy < d2) return true;
  }
  return false;
}

// Spawn 2–3 staggered expanding rings at (x, y) — called when a shard lands in water.
function spawnRipple(x, y) {
  const count = rndInt(2, 3);
  for (let i = 0; i < count; i++) {
    waterRipples.push({
      x, y,
      radius:    5  + i * 10,
      maxRadius: 50 + i * 25,
      age:       i * 5,   // stagger so rings don't all start at the same size
      maxAge:    30        // ~0.5 s at 60 fps
    });
  }
}

// Scatter 5–8 fast droplets from (x, y) — called when a cube impacts existing water.
function spawnSplash(x, y) {
  const count = rndInt(5, 8);
  for (let i = 0; i < count; i++) {
    const angle = rnd(0, Math.PI * 2);
    const speed = rnd(2.5, 6);
    waterDroplets.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rnd(2, 5),  // upward arc component
      radius: rnd(4, 9)
    });
  }
}

// Recount neighbours for all particles (O(n²), acceptable for n ≤ 200).
function countWaterNeighbors() {
  for (let i = 0; i < waterParticles.length; i++) waterParticles[i].neighborCount = 0;
  for (let i = 0; i < waterParticles.length; i++) {
    for (let j = i + 1; j < waterParticles.length; j++) {
      const dx = waterParticles[j].x - waterParticles[i].x;
      const dy = waterParticles[j].y - waterParticles[i].y;
      if (dx * dx + dy * dy < NEIGHBOR_RADIUS * NEIGHBOR_RADIUS) {
        waterParticles[i].neighborCount++;
        waterParticles[j].neighborCount++;
      }
    }
  }
}

// Physics + evaporation tick — called every frame regardless of game state.
function updateWater() {
  if (waterParticles.length === 0 && waterRipples.length === 0 && waterDroplets.length === 0) return;

  // Neighbour counts drive both surface-tension strength and evaporation rate
  countWaterNeighbors();

  // Surface tension: short-range attraction that clumps particles without collapsing them
  for (let i = 0; i < waterParticles.length; i++) {
    for (let j = i + 1; j < waterParticles.length; j++) {
      const pi = waterParticles[i], pj = waterParticles[j];
      const dx = pj.x - pi.x, dy = pj.y - pi.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < TENSION_RADIUS * TENSION_RADIUS && d2 > TENSION_MIN_DIST * TENSION_MIN_DIST) {
        const d  = Math.sqrt(d2);
        const f  = TENSION_FORCE / d;  // weaker with distance
        pi.vx += dx * f;  pi.vy += dy * f;
        pj.vx -= dx * f;  pj.vy -= dy * f;
      }
    }
  }

  // Integrate each particle: gravity, movement, friction, floor, evaporation
  for (let i = waterParticles.length - 1; i >= 0; i--) {
    const p = waterParticles[i];

    p.vy += WATER_GRAVITY;
    p.x  += p.vx;
    p.y  += p.vy;
    p.vx *= WATER_FRICTION;
    p.vy *= WATER_FRICTION;

    // Pool on counter surface
    if (p.y > counterY) { p.y = counterY; p.vy = 0; }
    // Clamp to canvas edges horizontally
    if (p.x < 0) { p.x = 0; p.vx = 0; }
    if (p.x > W) { p.x = W; p.vx = 0; }

    // Edge particles (few neighbours) evaporate fast; dense centre particles evaporate slowly.
    // The denominator raises with neighbour count so central particles survive far longer.
    if (p.evaporating) {
      const evapRate = (p.baseRadius / WATER_EVAP_FRAMES) / (1 + p.neighborCount * 0.45);
      p.radius -= evapRate;
      if (p.radius <= 0) { waterParticles.splice(i, 1); continue; }
    }
  }

  // Advance ripple rings toward their max radius, then remove when their lifetime ends
  for (let i = waterRipples.length - 1; i >= 0; i--) {
    const r = waterRipples[i];
    r.age++;
    r.radius += (r.maxRadius - r.radius) * 0.12;  // eases toward maxRadius
    if (r.age >= r.maxAge) waterRipples.splice(i, 1);
  }

  // Airborne splash droplets arc under gravity and become water particles on landing
  for (let i = waterDroplets.length - 1; i >= 0; i--) {
    const d = waterDroplets[i];
    d.vy += 0.45;   // droplet gravity (faster than water particles — they're airborne)
    d.x  += d.vx;
    d.y  += d.vy;
    d.vx *= 0.98;

    if (d.y >= counterY) {
      // Settled — convert to a resting water particle with slight horizontal carry
      spawnWaterParticle(d.x, counterY, d.radius, d.vx * 0.3, 0);
      waterDroplets.splice(i, 1);
    } else if (d.x < -60 || d.x > W + 60) {
      waterDroplets.splice(i, 1);  // flew off screen
    }
  }
}

// Draw all water onto the main canvas using the blur+contrast metaball technique.
// Called once per frame after drawCounter() so water appears on the marble surface.
function renderWater() {
  const hasParticles = waterParticles.length > 0;
  const hasRipples   = waterRipples.length   > 0;
  const hasDroplets  = waterDroplets.length  > 0;
  if (!hasParticles && !hasRipples && !hasDroplets) return;

  if (hasParticles) {
    // Step 1 — draw each particle as a flat white ellipse on the blob canvas.
    // Wide (×1.5) and short (×0.5) gives water the surface-pooling look.
    waterBlobCtx.clearRect(0, 0, W, H);
    waterBlobCtx.fillStyle = 'white';
    for (const p of waterParticles) {
      waterBlobCtx.beginPath();
      waterBlobCtx.ellipse(p.x, p.y, p.radius * 1.5, p.radius * 0.5, 0, 0, Math.PI * 2);
      waterBlobCtx.fill();
    }

    // Step 2 — draw the blob canvas onto the mask canvas with blur + high contrast.
    // blur() softens the ellipse edges so nearby circles overlap.
    // contrast(20) then pushes the blended region past the ~50% alpha threshold,
    // snapping overlapping areas to fully opaque — the classic metaball trick.
    waterMaskCtx.clearRect(0, 0, W, H);
    waterMaskCtx.filter = `blur(${WATER_BLUR_PX}px) contrast(20)`;
    waterMaskCtx.drawImage(waterBlobCanvas, 0, 0);
    waterMaskCtx.filter = 'none';

    // Step 3 — colorize: source-in fills only where the thresholded blobs have alpha.
    // Result: translucent blue water blobs, thicker (more opaque) where particles overlap.
    waterMaskCtx.globalCompositeOperation = 'source-in';
    waterMaskCtx.fillStyle = 'rgba(100, 168, 220, 0.68)';
    waterMaskCtx.fillRect(0, 0, W, H);
    waterMaskCtx.globalCompositeOperation = 'source-over';

    // Step 4 — blit the coloured blobs onto the main canvas
    ctx.drawImage(waterMaskCanvas, 0, 0);
  }

  // Draw airborne splash droplets as small blue dots (they're tiny and fast)
  if (hasDroplets) {
    ctx.save();
    ctx.fillStyle = 'rgba(100, 168, 220, 0.75)';
    for (const d of waterDroplets) {
      ctx.beginPath();
      ctx.arc(d.x, d.y, Math.max(1, d.radius * 0.55), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Draw ripple rings as flat ellipses that expand and fade over ~0.5 s
  if (hasRipples) {
    ctx.save();
    ctx.strokeStyle = 'rgba(160, 210, 245, 1)';
    ctx.lineWidth   = 1.5;
    for (const r of waterRipples) {
      const progress  = r.age / r.maxAge;
      ctx.globalAlpha = (1 - progress) * 0.55;
      ctx.beginPath();
      // Flat ellipse matches the water pool shape
      ctx.ellipse(r.x, r.y, r.radius * 1.5, r.radius * 0.5, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
}
// ─── END WATER SYSTEM ─────────────────────────────────────────────────────────

// ─── Drop / crack logic ───────────────────────────────────────────────────────
function releaseDrop() {
  const restY = counterY - ICE_H / 2;
  if (ice.y >= restY - 10) {
    // Barely lifted — just settle back with no throw
    ice.y  = restY;
    ice.vx = 0;
    ice.vy = 0;
    // Snap rotation back to flat when settling onto counter
    ice.angle      = 0;
    ice.angularVel = 0;
    state  = 'idle';
    mouseHistory = [];
    return;
  }

  // ── Compute throw velocity from mouse history ────────────────────────────
  let throwVx = 0, throwVy = 0;
  if (mouseHistory.length >= 2) {
    const oldest = mouseHistory[0];
    const newest = mouseHistory[mouseHistory.length - 1];
    const frames = mouseHistory.length - 1;
    throwVx = (newest.x - oldest.x) / frames;
    throwVy = (newest.y - oldest.y) / frames;
  }

  // Add tangential velocity from pendulum swing
  throwVx +=  pendulumAngVel * pendulumLen * Math.cos(pendulumAngle);
  throwVy -= pendulumAngVel * pendulumLen * Math.sin(pendulumAngle);

  // Cap velocity so the cube can never leave the screen in one frame
  throwVx = Math.max(-15, Math.min(15,  throwVx));
  throwVy = Math.max(-20, Math.min(20,  throwVy));

  ice.vx = throwVx;
  ice.vy = throwVy;

  mouseHistory = [];
  state = 'falling';
}

// Called when the falling ice cube hits the counter.
// Each impact ADDS new crack lines — cracks are never cleared between drops.
function impactCrack(impactVy) {
  const cx = ice.x;
  const cy = counterY - ICE_H / 2;

  // Splash effect: cube landing into existing water scatters droplets outward
  if (hasWaterNear(cx, counterY, 120)) {
    spawnSplash(cx, counterY);
  }

  if (impactVy < 6) {
    // Very slow tap — settle quietly with no new crack
    ice.y  = cy;
    ice.vy = 0;
    ice.angle      = 0;
    ice.angularVel = 0;
    state  = 'idle';
    return;
  }

  // ── Add new crack lines based on how hard the drop was ──────────────────
  let newCracks;
  if (impactVy < 12) {
    newCracks = makeCrackLines(rndInt(1, 2), 15, 40);
  } else if (impactVy < 20) {
    newCracks = makeCrackLines(rndInt(2, 4), 35, 65);
  } else {
    newCracks = makeCrackLines(rndInt(4, 6), 50, 85);
  }

  for (const crack of newCracks) {
    ice.cracks.push(crack);
  }

  // ── Check whether accumulated damage crosses the break threshold ─────────
  const crackCount  = ice.cracks.length;
  const crackLength = totalCrackLength(ice.cracks);
  const shouldBreak = crackCount  >= CRACK_COUNT_THRESHOLD
                   || crackLength >= CRACK_LENGTH_THRESHOLD;

  if (shouldBreak) {
    if (impactVy >= 15) {
      shards = genShards(cx, cy, rndInt(8, 14), 2.5);
    } else {
      shards = genShards(cx, cy, rndInt(4, 6), 1.0);
    }
    ice   = null;
    state = 'cracked';
  } else {
    ice.y  = cy;
    ice.vy = 0;
    ice.angle      = 0;
    ice.angularVel = 0;
    state  = 'idle';
  }
}

// Generate polygonal shards from an ice rect centred at (cx, cy)
function genShards(cx, cy, count, spread) {
  const hw = ICE_W / 2, hh = ICE_H / 2;

  const angles = [];
  for (let i = 0; i < count; i++) angles.push(rnd(0, Math.PI * 2));
  angles.sort((a, b) => a - b);

  const R = Math.sqrt(hw * hw + hh * hh) * 1.5;
  const result = [];

  for (let i = 0; i < count; i++) {
    const a0 = angles[i];
    const a1 = angles[(i + 1) % count];
    const amid = (a0 + a1) / 2;

    const sector = [
      [0, 0],
      [Math.cos(a0)   * R, Math.sin(a0)   * R],
      [Math.cos(amid) * R, Math.sin(amid) * R],
      [Math.cos(a1)   * R, Math.sin(a1)   * R]
    ];

    const clipped = clipToRect(sector, -hw, -hh, hw, hh);
    if (!clipped || clipped.length < 3) continue;

    let scx = 0, scy = 0;
    for (const [px, py] of clipped) { scx += px; scy += py; }
    scx /= clipped.length; scy /= clipped.length;

    const wx = cx + scx, wy = cy + scy;
    const localPoly = clipped.map(([px, py]) => [px - scx, py - scy]);

    const vx    = rnd(-4, 4);
    const airVy = spread > 1.5 ? rnd(-4, -1.5) : 0;

    result.push({
      x: wx, y: wy,
      vx, vy: 0,
      poly: localPoly,
      alpha: 1,
      scale: 1,
      airborne: true,
      airVy,
      bounced: false,
      falling: false,
      fallVy: 0
    });
  }
  return result;
}

// ─── Sutherland-Hodgman clipping ──────────────────────────────────────────────
function clipToRect(poly, x0, y0, x1, y1) {
  const edges = [
    { inside: p => p[0] >= x0, isect: (a, b) => { const t=(x0-a[0])/(b[0]-a[0]); return [x0, a[1]+t*(b[1]-a[1])]; } },
    { inside: p => p[0] <= x1, isect: (a, b) => { const t=(x1-a[0])/(b[0]-a[0]); return [x1, a[1]+t*(b[1]-a[1])]; } },
    { inside: p => p[1] >= y0, isect: (a, b) => { const t=(y0-a[1])/(b[1]-a[1]); return [a[0]+t*(b[0]-a[0]), y0]; } },
    { inside: p => p[1] <= y1, isect: (a, b) => { const t=(y1-a[1])/(b[1]-a[1]); return [a[0]+t*(b[0]-a[0]), y1]; } }
  ];
  let out = poly.slice();
  for (const edge of edges) {
    if (!out.length) return [];
    const inp = out; out = [];
    for (let i = 0; i < inp.length; i++) {
      const cur  = inp[i];
      const prev = inp[(i + inp.length - 1) % inp.length];
      const cIn  = edge.inside(cur);
      const pIn  = edge.inside(prev);
      if (cIn) { if (!pIn) out.push(edge.isect(prev, cur)); out.push(cur); }
      else if (pIn) out.push(edge.isect(prev, cur));
    }
  }
  return out;
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  // Water physics runs every frame so water persists across all game states
  updateWater();

  // ── idle ──
  if (state === 'idle') {
    if (!ice) { ice = mkIce(); }
    if (!drag) {
      // 0.985 friction lets the cube coast to a stop naturally after landing with horizontal velocity
      ice.vx *= 0.985;
      ice.x  += ice.vx;
      // Clamp to screen edges so the cube cannot slide off
      ice.x   = Math.max(ICE_W / 2, Math.min(W - ICE_W / 2, ice.x));
      ice.y   = counterY - ICE_H / 2;
    }
  }

  // ── held ──
  if (state === 'held' && ice) {
    // Record mouse position once per animation frame for velocity estimation.
    mouseHistory.push({ x: mouse.x, y: mouse.y });
    if (mouseHistory.length > VELOCITY_SAMPLE_COUNT) {
      mouseHistory.shift();
    }

    // ── Pendulum physics: mouse horizontal movement drives the swing ──
    if (pendulumLen > 1) {
      const deltaMouseX = mouse.x - lastMouseX;
      let angularAccel  = deltaMouseX * PENDULUM_MOUSE_ACCEL;
      angularAccel     -= pendulumAngle * PENDULUM_RESTORE;
      pendulumAngVel += angularAccel;
      pendulumAngVel *= PENDULUM_DAMP;
      pendulumAngVel = Math.max(-MAX_PENDULUM_ANGVEL, Math.min(MAX_PENDULUM_ANGVEL, pendulumAngVel));
      pendulumAngle  += pendulumAngVel;
    }
    lastMouseX = mouse.x;

    const targetX  = mouse.x + pendulumLen * Math.sin(pendulumAngle);
    const targetY  = mouse.y + pendulumLen * Math.cos(pendulumAngle);
    const onCounter = ice.y >= counterY - ICE_H / 2 - 2;
    const prevIceY  = ice.y;

    if (onCounter && targetY > counterY - ICE_H / 2 - 15) {
      const slideX = Math.max(ICE_W / 2, Math.min(W - ICE_W / 2, targetX));
      ice.x += (slideX - ice.x) * 0.22;
      ice.y  = counterY - ICE_H / 2;
    } else {
      ice.x = targetX;
      ice.y = targetY;
    }

    ice.angle      = cubeAngleAtGrab - (pendulumAngle - pendulumAngleAtGrab);
    ice.angularVel = -pendulumAngVel;

    // ── Smash detection: slam the cube into the counter while still holding ──
    const restY      = counterY - ICE_H / 2;
    const iceFrameVy = ice.y - prevIceY;
    if (ice.y >= restY && iceFrameVy > 12) {
      const smashX = ice.x;
      ice.y = restY;
      // Trigger water splash if smashing into existing water
      if (hasWaterNear(smashX, counterY, 120)) spawnSplash(smashX, counterY);
      shards = genShards(smashX, restY, rndInt(8, 14), 2.5);
      ice    = null;
      state  = 'cracked';
      drag   = null;
      canvas.style.cursor = 'default';
      mouseHistory = [];
    }
  }

  // ── falling ──
  if (state === 'falling' && ice) {
    ice.vy += 0.6;   // gravity = 0.6px per frame squared
    ice.x  += ice.vx;
    ice.y  += ice.vy;
    ice.vx *= 0.99;

    // Angular velocity after release — spin carries, then fades out
    ice.angle      += ice.angularVel;
    ice.angularVel *= SPIN_DAMP;

    // Wall bouncing (left/right) with 0.5 dampening
    if (ice.x - ICE_W / 2 < 0) { ice.x  = ICE_W / 2;       ice.vx = -ice.vx * 0.5; }
    if (ice.x + ICE_W / 2 > W) { ice.x  = W - ICE_W / 2;   ice.vx = -ice.vx * 0.5; }
    if (ice.y - ICE_H / 2 < 0) { ice.y  = ICE_H / 2;        ice.vy = 0; }

    // TODO: ground collision uses bounding box, may clip when rotated
    const restY = counterY - ICE_H / 2;
    if (ice.y >= restY) {
      ice.y = restY;
      impactCrack(ice.vy);
    }
  }

  // ── cracked ──
  if (state === 'cracked') {
    // Drag a shard
    if (drag && drag.type === 'shard') {
      const s = shards[drag.idx];
      if (s && !s.falling) {
        const tx = mouse.x - drag.offX;
        const ty = mouse.y - drag.offY;
        s.vx = tx - s.x;
        s.vy = ty - s.y;
        s.x  = tx;
        s.y  = ty;
      }
    }

    for (let i = shards.length - 1; i >= 0; i--) {
      const s = shards[i];
      if (drag && drag.type === 'shard' && drag.idx === i) continue;

      if (s.falling) {
        // Fall off edge
        s.fallVy += 1.8;
        s.x      += s.vx * 0.9;
        s.y      += s.fallVy;
        s.vx     *= 0.9;
        s.alpha  -= 0.035;
        if (s.alpha <= 0) { shards.splice(i, 1); }
        continue;
      }

      if (s.airborne) {
        // High-drop bounce arc
        s.airVy += 0.55;
        s.x     += s.vx;
        s.y     += s.airVy;
        s.vx    *= 0.98;

        const floor = counterY - 10;
        if (s.y >= floor) {
          s.y        = floor;
          s.airborne = false;
          s.airVy    = 0;
          s.vx      *= 0.6;
          s.vx      += rnd(-1.0, 1.0);
          // Ripple effect when a shard lands on existing water
          if (hasWaterNear(s.x, counterY, 80)) spawnRipple(s.x, counterY);
        }
        if (s.x < -30 || s.x > W + 30) { s.falling = true; s.fallVy = 0; }
        continue;
      }

      // Sliding on counter — reduced friction (wet ice on smooth marble)
      s.vx *= 0.985;
      s.x  += s.vx;
      s.y   = counterY - 10;

      if (s.x < -30 || s.x > W + 30) { s.falling = true; s.fallVy = 0; }
    }

    // Check if all grounded shards have stopped — trigger melt sequence
    const groundedShards = shards.filter(s => !s.falling);
    if (groundedShards.length > 0 &&
        groundedShards.every(s => !s.airborne && Math.abs(s.vx) < 0.15)) {

      shards = groundedShards.slice();

      // Reset evap gate so particles spawned during this melt don't evaporate yet
      waterEvapActive = false;

      // Initialise each shard for the melt animation
      for (const s of shards) {
        s.meltProgress    = 0;      // 0.0 = frozen, 1.0 = fully melted
        s.meltWidthScale  = 1;
        s.meltHeightScale = 1;
        s.waterSpawned    = false;  // whether this shard has released its water particles
      }

      meltFrameTime = 0;
      state         = 'melting';
    }

    // All shards fell off the edge — skip melt, go straight to spawn
    if (shards.length === 0) {
      spawnTimer = 0;
      state      = 'spawning';
    }
  }

  // MELT SEQUENCE
  // ── melting ──
  if (state === 'melting') {
    meltFrameTime++;

    for (const s of shards) {
      s.meltProgress = Math.min(1, s.meltProgress + MELT_RATE);  // 0.0 → 1.0

      // Height shrinks faster than width — ice flattens before it disappears
      const mp = s.meltProgress;
      if (mp <= 0.5) {
        s.meltWidthScale  = lerp(1.0, 0.85, mp * 2);
        s.meltHeightScale = lerp(1.0, 0.40, mp * 2);
      } else {
        s.meltWidthScale  = lerp(0.85, 0, (mp - 0.5) * 2);
        s.meltHeightScale = lerp(0.40, 0, (mp - 0.5) * 2);
      }

      // Opacity fades as shard collapses
      s.alpha = 1 - (mp * 0.8);

      // Spawn water particles when each shard is halfway melted —
      // particles appear as the shard is still visibly shrinking
      if (!s.waterSpawned && s.meltProgress >= 0.5) {
        const count = rndInt(2, 4);
        for (let k = 0; k < count; k++) {
          spawnWaterParticle(
            s.x + rnd(-18, 18),
            counterY + rnd(-4, 4),
            rnd(14, 22)
          );
        }
        s.waterSpawned = true;
      }
    }

    // Once every shard has fully melted, start evaporation and transition to spawning.
    // Water particles are now independent and persist across the next cube's life.
    if (shards.every(s => s.meltProgress >= 1)) {
      shards = [];
      startWaterEvaporation();  // begins the 8-second shrink-from-edges evaporation
      spawnTimer = 0;
      state      = 'spawning';  // water handles its own visual fade — no puddle_fading needed
    }
  }

  // ── spawning ──
  if (state === 'spawning') {
    spawnTimer++;
    if (spawnTimer >= SPAWN_FRAMES) {
      ice   = mkIce();   // fresh cube with empty cracks[] — crack state resets here
      state = 'idle';
      // A new cube has arrived — update the on-screen counter
      cubeCount++;
      document.getElementById('cube-counter').textContent = 'Cubes: ' + cubeCount;
    }
  }
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────

// Static marble vein paths — computed once per resize
let veinPaths = null;
function buildVeinPaths() {
  veinPaths = [];
  const numVeins = 6;
  for (let i = 0; i < numVeins; i++) {
    // Deterministic-ish layout so they don't jump on redraw
    const x0 = (i / numVeins) * W * 1.1 - W * 0.05;
    const x1 = x0 + rnd(-W * 0.3, W * 0.4);
    const x2 = x1 + rnd(W * 0.2, W * 0.5);
    const y0 = counterY + rnd(5, 30);
    const y1 = counterY + rnd(10, 60);
    const y2 = counterY + rnd(5, 50);
    veinPaths.push({ x0, y0, x1, y1, x2, y2, w: rnd(0.4, 1.8) });
  }
}
buildVeinPaths();
window.addEventListener('resize', () => { buildVeinPaths(); });

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, counterY);
  grad.addColorStop(0,   '#04060d');
  grad.addColorStop(0.6, '#080d1a');
  grad.addColorStop(1,   '#0c1323');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, counterY);
}

function drawCounter() {
  // Marble base
  const grad = ctx.createLinearGradient(0, counterY, 0, H);
  grad.addColorStop(0,   '#d6d4cf');
  grad.addColorStop(0.2, '#e4e2de');
  grad.addColorStop(0.6, '#d0cecc');
  grad.addColorStop(1,   '#b8b6b3');
  ctx.fillStyle = grad;
  ctx.fillRect(0, counterY, W, H - counterY);

  // Veining
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (const v of veinPaths) {
    ctx.beginPath();
    ctx.moveTo(v.x0, v.y0);
    ctx.quadraticCurveTo(v.x1, v.y1, v.x2, v.y2);
    ctx.strokeStyle = '#777';
    ctx.lineWidth   = v.w;
    ctx.stroke();
  }
  ctx.restore();

  // Top-edge highlight
  const edge = ctx.createLinearGradient(0, counterY, 0, counterY + 8);
  edge.addColorStop(0,   'rgba(255,255,255,0.65)');
  edge.addColorStop(0.5, 'rgba(230,230,230,0.2)');
  edge.addColorStop(1,   'rgba(200,200,200,0)');
  ctx.fillStyle = edge;
  ctx.fillRect(0, counterY, W, 8);
}

function drawIce(ic) {
  ctx.save();
  ctx.globalAlpha = ic.alpha;
  ctx.translate(ic.x, ic.y);

  const hw = ICE_W / 2, hh = ICE_H / 2;

  // Drop shadow on counter — drawn BEFORE rotation so it stays flat
  if (ic.y >= counterY - ICE_H / 2 - 2) {
    ctx.save();
    ctx.globalAlpha = ic.alpha * 0.3;
    const sg = ctx.createRadialGradient(0, hh + 2, 5, 0, hh + 8, hw * 0.85);
    sg.addColorStop(0,   'rgba(0,0,0,0.55)');
    sg.addColorStop(0.5, 'rgba(0,0,0,0.2)');
    sg.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(-hw * 0.9, hh - 2, ICE_W * 0.9, 20);
    ctx.restore();
  }

  // Rotate the cube body around its own center
  ctx.rotate(ic.angle || 0);

  // Body gradient
  const body = ctx.createLinearGradient(-hw, -hh, hw, hh);
  body.addColorStop(0,    'rgba(215,238,255,0.85)');
  body.addColorStop(0.35, 'rgba(190,222,255,0.68)');
  body.addColorStop(0.7,  'rgba(175,212,250,0.72)');
  body.addColorStop(1,    'rgba(155,198,245,0.78)');
  ctx.fillStyle   = body;
  ctx.strokeStyle = 'rgba(210,235,255,0.9)';
  ctx.lineWidth   = 1.5;
  roundRect(ctx, -hw, -hh, ICE_W, ICE_H, 4);
  ctx.fill();
  ctx.stroke();

  // Inner refraction / frost lines
  ctx.save();
  ctx.globalAlpha = ic.alpha * 0.40;
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth   = 1;
  const refs = [
    [-hw * 0.55, -hh * 0.25,  hw * 0.20,  hh * 0.70],
    [-hw * 0.10, -hh * 0.80,  hw * 0.65,  hh * 0.15],
    [-hw * 0.80,  hh * 0.05,  hw * 0.05, -hh * 0.55],
    [ hw * 0.05, -hh * 0.60, -hw * 0.45,  hh * 0.50]
  ];
  for (const [x0, y0, x1, y1] of refs) {
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
  }
  ctx.restore();

  // Cracks (local coords) — all accumulated crack lines drawn together
  if (ic.cracks.length) {
    ctx.save();
    ctx.globalAlpha = ic.alpha * 0.9;
    ctx.strokeStyle = 'rgba(160,210,255,0.95)';
    ctx.lineWidth   = 1.1;
    for (const [x0, y0, x1, y1] of ic.cracks) {
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore();
}

function drawShard(s) {
  if (s.poly.length < 3) return;
  ctx.save();
  ctx.globalAlpha = s.alpha;

  // MELT SEQUENCE — shift shard down as it melts so the base stays at counter level
  const isMelting  = s.meltProgress !== undefined && s.meltProgress > 0;
  const sinkOffset = isMelting ? (1 - s.meltHeightScale) * 15 : 0;

  ctx.translate(s.x, s.y + sinkOffset);

  // MELT SEQUENCE — non-uniform scale: height shrinks faster than width
  if (isMelting) {
    ctx.scale(s.meltWidthScale, s.meltHeightScale);
  } else if (s.scale !== undefined && s.scale < 1) {
    ctx.scale(s.scale, s.scale);
  }

  // Shadow — skip during melting because water particles serve that role
  if (!s.falling && !s.airborne && !isMelting) {
    ctx.save();
    ctx.globalAlpha = s.alpha * 0.22;
    ctx.fillStyle   = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.ellipse(0, 12, 20, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Shard body
  const g = ctx.createLinearGradient(-30, -30, 30, 30);
  g.addColorStop(0,   'rgba(218,240,255,0.82)');
  g.addColorStop(0.5, 'rgba(185,218,252,0.72)');
  g.addColorStop(1,   'rgba(158,200,245,0.75)');
  ctx.fillStyle   = g;
  ctx.strokeStyle = 'rgba(210,235,255,0.92)';
  ctx.lineWidth   = 1;

  ctx.beginPath();
  ctx.moveTo(s.poly[0][0], s.poly[0][1]);
  for (let i = 1; i < s.poly.length; i++) ctx.lineTo(s.poly[i][0], s.poly[i][1]);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function drawSpawning() {
  const t = spawnTimer / SPAWN_FRAMES;
  const fakeIce = {
    x: W / 2,
    y: counterY - ICE_H / 2,
    cracks: [],
    alpha: t
  };
  drawIce(fakeIce);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── Cursor hint ──────────────────────────────────────────────────────────────
function updateCursor() {
  if (state === 'held') { canvas.style.cursor = 'grabbing'; return; }
  if (state === 'idle' && ice && hitBox(mouse.x, mouse.y, ice.x, ice.y, ICE_W, ICE_H)) {
    canvas.style.cursor = 'grab'; return;
  }
  if (state === 'cracked') {
    for (const s of shards) {
      if (!s.falling && hitPoly(mouse.x - s.x, mouse.y - s.y, s.poly)) {
        canvas.style.cursor = 'grab'; return;
      }
    }
  }
  canvas.style.cursor = 'default';
}

// ─── Main loop ────────────────────────────────────────────────────────────────
function frame() {
  update();
  updateCursor();

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawCounter();

  // Water renders on the counter surface, underneath ice and shards,
  // and persists across all game states (water is never cleared on spawn)
  renderWater();

  if ((state === 'idle' || state === 'held' || state === 'falling') && ice) {
    drawIce(ice);
  }
  if (state === 'cracked') {
    for (const s of shards) drawShard(s);
  }
  if (state === 'melting') {
    // Water particles appear beneath the flattening shards via renderWater() above
    for (const s of shards) drawShard(s);
  }
  if (state === 'spawning') {
    drawSpawning();
  }

  requestAnimationFrame(frame);
}

// Start
ice = mkIce();
frame();
</script>
</body>
